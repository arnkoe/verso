name: Publier une version

# Workflow standard documenté par Tauri :
# https://v2.tauri.app/distribute/pipelines/github/
#
# Déclenchement : pousser sur la branche `release`. tauri-action lit la version
# dans src-tauri/tauri.conf.json, crée le tag (verso-v<version>) et une release
# GitHub BROUILLON, construit/signe les bundles macOS (ARM + Intel) et Windows,
# et fusionne `latest.json` plateforme par plateforme (un seul job en matrice).
# Le job `publish` bascule ensuite le brouillon en release publiée.
on:
  push:
    branches:
      - release
  workflow_dispatch: # permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Installer Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Installer les dépendances npm
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Clé privée de signature des mises à jour (secret du dépôt).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Clé générée sans passphrase : password vide. GitHub interdisant les
          # secrets vides, on n'en crée pas et on force la chaîne vide ici.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          # tauri-action crée le tag à partir de la version de tauri.conf.json.
          tagName: verso-v__VERSION__
          releaseName: "Verso v__VERSION__"
          releaseDraft: true
          prerelease: false
          # Génère et fusionne latest.json (fichier interrogé par l'updater).
          includeUpdaterJson: true
          args: ${{ matrix.args }}
          releaseBody: |
            ## Installation sur Windows

            L'application n'est pas signée par un certificat reconnu. Au premier
            lancement, Windows affiche un écran bleu **« Windows a protégé votre
            ordinateur »** (Microsoft Defender SmartScreen). C'est normal. Pour
            débloquer (une seule fois) :

            1. Cliquez sur **Informations complémentaires**.
            2. Cliquez sur le bouton **Exécuter quand même**.

            Les mises à jour suivantes s'installeront sans cette étape.

            ## Installation sur macOS

            L'application n'est pas notarisée par Apple. Au premier lancement,
            macOS affiche « "Verso" est endommagé et ne peut pas être ouvert ».
            C'est normal. Pour débloquer (une seule fois) :

            1. Glissez **Verso** dans le dossier **Applications**.
            2. Ouvrez le **Terminal** et exécutez :

               ```
               xattr -dr com.apple.quarantine /Applications/Verso.app
               ```

            3. Lancez Verso normalement. Les mises à jour suivantes
               s'installeront sans cette étape.

            ---

            Voir les changements ci-dessous.

  # Bascule la release brouillon en publiée une fois tous les builds réussis.
  publish:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Basculer la release en publiée
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pkg } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'src-tauri/tauri.conf.json',
              ref: context.sha,
            });
            const version = JSON.parse(
              Buffer.from(pkg.content, 'base64').toString()
            ).version;
            const tag = `verso-v${version}`;
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              throw new Error(`Release introuvable pour le tag ${tag}`);
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
