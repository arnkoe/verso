name: Publier une version

# Déclenché quand on pousse un tag de version (ex. v0.2.0).
# Construit Verso pour macOS (Apple Silicon + Intel) et Windows, signe les
# bundles avec la clé updater, et publie une release GitHub avec un unique
# `latest.json` couvrant les trois plateformes.
#
# Pattern officiel Tauri pour le multi-plateforme :
#   1. create-release : crée une release BROUILLON et expose son id.
#   2. build (matrice) : chaque job construit, signe et uploade ses bundles
#      DANS cette release ; tauri-action complète latest.json plateforme par
#      plateforme (au lieu de l'écraser comme en publication parallèle).
#   3. publish : bascule le brouillon en release publiée.
# Cela évite que le dernier job (Windows) écrase les entrées macOS de
# latest.json, ce qui empêchait l'updater macOS de voir les mises à jour.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Créer la release brouillon
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const body = [
              '## Installation sur Windows',
              '',
              "L'application n'est pas signée par un certificat reconnu. Au premier",
              'lancement, Windows affiche un écran bleu **« Windows a protégé votre',
              'ordinateur »** (Microsoft Defender SmartScreen). C\'est normal. Pour',
              'débloquer (une seule fois) :',
              '',
              '1. Cliquez sur **Informations complémentaires**.',
              '2. Cliquez sur le bouton **Exécuter quand même**.',
              '',
              'Les mises à jour suivantes s\'installeront sans cette étape.',
              '',
              '## Installation sur macOS',
              '',
              "L'application n'est pas notarisée par Apple. Au premier lancement,",
              'macOS affiche « "Verso" est endommagé et ne peut pas être ouvert ».',
              "C'est normal. Pour débloquer (une seule fois) :",
              '',
              '1. Glissez **Verso** dans le dossier **Applications**.',
              '2. Ouvrez le **Terminal** et exécutez :',
              '',
              '   ```',
              '   xattr -dr com.apple.quarantine /Applications/Verso.app',
              '   ```',
              '',
              '3. Lancez Verso normalement. Les mises à jour suivantes',
              "   s'installeront sans cette étape.",
              '',
              '---',
              '',
              'Voir les changements ci-dessous.',
            ].join('\n');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Verso ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances npm
        run: npm ci

      - name: Construire, signer et uploader vers la release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Clé privée de signature des mises à jour (secret du dépôt).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Clé générée sans passphrase : password vide. GitHub interdisant les
          # secrets vides, on n'en crée pas et on force la chaîne vide ici.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          # Uploade dans la release brouillon créée plus haut. Chaque job ajoute
          # ses bundles et complète latest.json pour sa plateforme.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # Génère latest.json (fichier interrogé par l'updater).
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  publish:
    needs: [create-release, build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publier la release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
