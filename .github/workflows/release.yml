name: Publier une version

# Déclenché quand on pousse un tag de version (ex. v0.2.0).
# Construit Verso pour macOS (Apple Silicon + Intel) et Windows, signe les
# bundles avec la clé updater, puis publie une release GitHub et un unique
# `latest.json` agrégeant les trois plateformes.
#
# Pourquoi deux phases (build puis publish) ?
# tauri-action en matrice parallèle réécrit `latest.json` à chaque job, si bien
# que le dernier job (Windows) écrasait les entrées macOS. Résultat : sur Mac,
# l'updater ne trouvait aucune plateforme et ne proposait jamais de mise à jour.
# On sépare donc le build (qui ne fait qu'uploader des artefacts) de la
# publication (un seul job qui assemble un `latest.json` complet).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances npm
        run: npm ci

      - name: Construire et signer les bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Clé privée de signature des mises à jour (secret du dépôt).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Clé générée sans passphrase : password vide. GitHub interdisant les
          # secrets vides, on n'en crée pas et on force la chaîne vide ici.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          # On ne crée PAS la release ici : chaque job ne fait que construire.
          args: --target ${{ matrix.target }}

      - name: Rassembler les bundles à publier
        shell: bash
        run: |
          set -eu
          mkdir -p dist
          base="src-tauri/target/${{ matrix.target }}/release/bundle"
          target="${{ matrix.target }}"
          # Copie les installateurs, les archives updater et leurs signatures.
          find "$base" \
            \( -name "*.dmg" \
            -o -name "*.app.tar.gz" \
            -o -name "*-setup.exe" \
            -o -name "*.sig" \) \
            -exec cp {} dist/ \;
          # Les deux archives updater macOS portent le même nom (Verso.app.tar.gz)
          # quelle que soit l'architecture. On les renomme avec le target pour
          # éviter qu'une architecture n'écrase l'autre au moment d'agréger.
          for f in dist/*.app.tar.gz dist/*.app.tar.gz.sig; do
            [ -e "$f" ] || continue
            dir="$(dirname "$f")"; nameNoArch="$(basename "$f")"
            case "$nameNoArch" in
              *"$target"*) ;; # déjà taggé
              *.app.tar.gz)     mv "$f" "$dir/Verso_${target}.app.tar.gz" ;;
              *.app.tar.gz.sig) mv "$f" "$dir/Verso_${target}.app.tar.gz.sig" ;;
            esac
          done
          ls -la dist

      - name: Uploader les artefacts du build
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Télécharger tous les bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundles-*
          merge-multiple: true
          path: dist

      - name: Lister les bundles
        run: ls -la dist

      - name: Générer latest.json (agrège les trois plateformes)
        env:
          TAG: ${{ github.ref_name }}
        run: node .github/scripts/generate-latest-json.mjs

      - name: Publier la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Verso ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            dist/*.dmg
            dist/*.app.tar.gz
            dist/*.app.tar.gz.sig
            dist/*-setup.exe
            dist/*-setup.exe.sig
            dist/latest.json
          body: |
            ## Installation sur Windows

            L'application n'est pas signée par un certificat reconnu. Au premier
            lancement, Windows affiche un écran bleu **« Windows a protégé votre
            ordinateur »** (Microsoft Defender SmartScreen). C'est normal. Pour
            débloquer (une seule fois) :

            1. Cliquez sur **Informations complémentaires**.
            2. Cliquez sur le bouton **Exécuter quand même**.

            Les mises à jour suivantes s'installeront sans cette étape.

            ## Installation sur macOS

            L'application n'est pas notarisée par Apple. Au premier lancement,
            macOS affiche « "Verso" est endommagé et ne peut pas être ouvert ».
            C'est normal. Pour débloquer (une seule fois) :

            1. Glissez **Verso** dans le dossier **Applications**.
            2. Ouvrez le **Terminal** et exécutez :

               ```
               xattr -dr com.apple.quarantine /Applications/Verso.app
               ```

            3. Lancez Verso normalement. Les mises à jour suivantes
               s'installeront sans cette étape.

            ---

            Voir les changements ci-dessous.
