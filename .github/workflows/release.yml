name: Publier une version

# Workflow standard documenté par Tauri :
# https://v2.tauri.app/distribute/pipelines/github/
# Variante "release manuelle" (création de la release dissociée du build) :
# https://github.com/tauri-apps/tauri-action/blob/dev/examples/publish-to-manual-release.yml
#
# Déclenchement : pousser sur la branche `release`.
#
# Pourquoi cette variante plutôt que la matrice unique de la doc ? Avec la
# matrice unique, les trois jobs (macOS x2 + Windows) démarrent en parallèle,
# cherchent la release du tag, n'en trouvent aucune et en créent CHACUN une :
# GitHub autorise plusieurs releases draft sur le même tag. Résultat (constaté
# en 0.4.5) : deux releases concurrentes, les bundles répartis entre les deux,
# et un latest.json incomplet -> l'auto-update Windows ne voyait aucun bundle.
#
# Ici, un seul job `create-release` crée la release BROUILLON une fois et expose
# son id. Les jobs de build s'y rattachent via `releaseId` (sans toucher au
# tag), fusionnent latest.json plateforme par plateforme, puis `publish-release`
# bascule le brouillon en release publiée une fois tous les builds réussis.
on:
  push:
    branches:
      - release
  workflow_dispatch: # permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  # Crée la release brouillon une seule fois et expose son id aux jobs de build.
  # La version (donc le tag) est lue dans src-tauri/tauri.conf.json, source de
  # vérité de l'app (cf. CLAUDE.md), pas dans package.json.
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v5

      - name: Lire la version
        run: echo "PACKAGE_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> "$GITHUB_ENV"

      - name: Créer la release brouillon
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const version = process.env.PACKAGE_VERSION;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `verso-v${version}`,
              name: `Verso v${version}`,
              draft: true,
              prerelease: false,
              body: `## Quel fichier télécharger ?

            - **Windows** : le fichier qui finit par \`setup.exe\`.
            - **Mac récent (puce Apple)** : le fichier \`.dmg\` qui contient \`aarch64\`.
            - **Mac plus ancien (puce Intel)** : le fichier \`.dmg\` qui contient \`x64\`.

            Pas sûr de votre Mac ? Menu Pomme → **À propos de ce Mac**, regardez
            la ligne « Puce » ou « Processeur ».

            > Au premier lancement, votre ordinateur affichera un message qui fait
            > peur. **C'est normal et ce n'est pas un virus** : Verso est un logiciel
            > gratuit qui n'a pas les certificats payants de Microsoft et d'Apple.
            > Voici comment passer cette étape, une seule fois.

            ## Premier lancement sur Windows

            Windows peut afficher un **écran bleu** : « Windows a protégé votre
            ordinateur ». Pour continuer :

            1. Cliquez sur le petit texte **« Informations complémentaires »**.
            2. Cliquez sur le bouton **« Exécuter quand même »** qui apparaît.

            Les mises à jour suivantes s'installeront toutes seules, sans cette étape.

            ## Premier lancement sur Mac

            1. Ouvrez le fichier \`.dmg\`, puis **glissez Verso dans le dossier
               Applications**.
            2. Si le Mac affiche « "Verso" est endommagé et ne peut pas être ouvert »,
               une petite manipulation est nécessaire, **une seule fois** :

               a. Ouvrez le **Terminal** : appuyez sur **Cmd + Espace**, tapez
                  \`Terminal\`, puis **Entrée**.

               b. Copiez-collez cette ligne dans la fenêtre noire :

                  \`\`\`
                  xattr -dr com.apple.quarantine /Applications/Verso.app
                  \`\`\`

               c. Appuyez sur **Entrée** (rien ne s'affiche, c'est normal), puis
                  fermez le Terminal.

            3. Ouvrez Verso normalement. Les mises à jour suivantes s'installeront
               toutes seules, sans cette étape.

            ---

            Voir les changements ci-dessous.`,
            });
            return data.id;

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Les recueils seeds (resources/songbooks) sont un submodule pointant
          # vers le dépôt de données verso-songbooks : sans ce checkout récursif,
          # le dossier serait vide et le build n'embarquerait aucun recueil.
          submodules: recursive

      - name: Installer Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Installer Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Cache du registre et des artefacts de compilation Rust. La clé inclut
      # plateforme + args (target) pour que les trois jobs de la matrice ne se
      # marchent pas dessus. Économise l'essentiel des minutes de compilation
      # sur les runs suivants.
      - name: Cacher Rust/cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Installer les dépendances npm
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Clé privée de signature des mises à jour (secret du dépôt).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Clé générée sans passphrase : password vide. On force la chaîne vide
          # littérale (pas de secret, GitHub interdisant les secrets vides).
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          # Rattache les bundles à la release brouillon créée en amont : pas de
          # tagName/releaseName ici, sinon chaque job retenterait de créer sa
          # propre release (la race condition que ce workflow corrige).
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # Génère et fusionne latest.json (fichier interrogé par l'updater).
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  # Bascule la release brouillon en publiée une fois tous les builds réussis.
  publish-release:
    needs: [create-release, build-tauri]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Basculer la release en publiée
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false,
            });
