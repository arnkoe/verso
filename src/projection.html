<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Verso — Projection</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<script src="vendor/pdfjs/pdf.min.js"></script>
<script src="assets/js/pdf-worker-config.js"></script>
<link rel="stylesheet" href="assets/css/projection-content.css">
<style>
:root {
  --aspect-w: 16;
  --aspect-h: 9;
  --ref-w: 1600;
  --ref-h: 900;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #fff;
  color: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
}

#root {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#screen {
  position: relative;
  z-index: 2;
  width: calc(var(--ref-w) * 1px);
  height: calc(var(--ref-h) * 1px);
  flex: none;
  transform: scale(var(--fit, 1));
  transform-origin: center center;
  display: none;
  flex-direction: column;
  align-items: stretch;
  justify-content: flex-start;
  background: #fff;
  overflow: hidden;
  container-type: size;
  border: 1px solid #ddd;
}
#screen.active { display: flex; }
</style>
</head>
<body>
<div id="root">
  <div id="screen"></div>
</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/projection-render.js"></script>
<script src="assets/js/projection.js"></script>
</body>
</html>
